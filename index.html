<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrosoluciones Aéreas - Sistema Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; } 
        .tabla-header { background-color: #1b6b43; } 
    </style>
</head>
<body class="text-gray-800">

    <!-- LOGIN -->
    <div id="login-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-green-100 max-w-md w-full">
            <div class="text-center mb-8">
                <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-helicopter text-4xl text-green-700"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-gray-800">Agrosoluciones Aéreas</h1>
                <p class="text-sm text-gray-500 mt-1 font-medium">Acceso exclusivo al sistema operativo</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-envelope text-gray-400"></i></div>
                    <input type="email" id="loginEmail" placeholder="Correo Electrónico" required class="w-full pl-10 pr-4 py-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-green-600 outline-none">
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-gray-400"></i></div>
                    <input type="password" id="loginPassword" placeholder="Contraseña" required class="w-full pl-10 pr-4 py-3 bg-gray-50 border rounded-xl text-sm focus:ring-2 focus:ring-green-600 outline-none">
                </div>
                <div id="loginError" class="hidden bg-rose-50 text-rose-600 text-sm font-bold p-3 rounded-lg text-center border"></div>
                <button type="submit" id="btnLogin" class="w-full py-3 rounded-xl text-sm font-bold text-white bg-green-700 hover:bg-green-600 transition-all shadow-md">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Iniciar Sesión
                </button>
            </form>
        </div>
    </div>


    <!-- PANEL DE CONTROL -->
    <div id="dashboard-container" class="hidden pb-12">
        <nav class="tabla-header text-white px-6 py-3 flex justify-between items-center shadow-md sticky top-0 z-50">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-helicopter text-2xl"></i>
                <div>
                    <h1 class="text-xl font-bold leading-tight">Agrosoluciones Aéreas</h1>
                    <p id="badge-rol" class="text-[10px] text-green-200 font-bold tracking-widest uppercase bg-green-900/50 px-2 rounded mt-0.5 inline-block"></p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button onclick="cambiarVista('clientes')" id="nav-clientes" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded-md text-sm font-bold transition-colors shadow-sm"><i class="fa-solid fa-users md:mr-2"></i> <span class="hidden md:inline">Clientes</span></button>
                <button onclick="cambiarVista('propiedades')" id="nav-propiedades" class="border border-green-500/50 hover:bg-green-700 px-4 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-map-location-dot md:mr-2"></i> <span class="hidden md:inline">Parcelas</span></button>
                <button onclick="cambiarVista('servicios')" id="nav-servicios" class="border border-green-500/50 hover:bg-green-700 px-4 py-2 rounded-md text-sm font-medium transition-colors"><i class="fa-solid fa-plane-up md:mr-2"></i> <span class="hidden md:inline">Vuelos</span></button>
                <div class="h-6 w-px bg-green-600 mx-2 hidden md:block"></div>
                <button onclick="cerrarSesion()" class="bg-rose-600 hover:bg-rose-500 px-3 py-2 rounded-md text-sm font-bold transition-colors shadow-sm" title="Cerrar Sesión"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto mt-6 px-6 block lg:table lg:table-fixed w-full border-spacing-x-8">
            
            <!-- FORMULARIOS -->
            <div class="block lg:table-cell w-full lg:w-1/3 vertical-align-top space-y-6 pb-8 lg:pb-0">
                
                <div id="vista-form-clientes" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 block">
                    <h3 id="tituloFormCliente" class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-user-plus text-green-600 mr-2"></i> Nuevo Cliente</h3>
                    <form id="registroForm" class="space-y-4">
                        <input type="hidden" id="editClienteId">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="nombre" placeholder="Nombre(s)" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                            <input type="text" id="apellidos" placeholder="Apellidos" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                        </div>
                        <input type="email" id="email" placeholder="Correo Electrónico" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="telefono" placeholder="Teléfono" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                            <input type="text" id="rfc" placeholder="RFC" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none uppercase">
                        </div>
                        <button type="submit" id="btnSubmitCliente" class="w-full py-2.5 rounded-full text-sm font-bold text-white bg-[#4ade80] hover:bg-green-500 text-green-900 transition-colors shadow-sm">Guardar Cliente</button>
                        <button type="button" id="btnCancelarCliente" class="hidden w-full py-2 rounded-full text-xs font-bold text-gray-600 bg-gray-200 hover:bg-gray-300">Cancelar Edición</button>
                    </form>
                </div>

                <div id="vista-form-propiedades" class="bg-white p-6 rounded-2xl shadow-sm border hidden">
                    <h3 id="tituloFormPropiedad" class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-map-location-dot text-green-600 mr-2"></i> Registrar Parcela</h3>
                    <form id="propiedadForm" class="space-y-4">
                        <input type="hidden" id="editPropiedadId">
                        <select id="selectCliente" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none"></select>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="nombre_propiedad" placeholder="Nombre Rancho" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                            <input type="text" id="tipo_cultivo" placeholder="Cultivo" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" step="0.01" id="superficie_has" placeholder="Hectáreas" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                            <select id="sistema_riego" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none"><option>Temporal</option><option>Aspersión</option><option>Goteo</option><option>Gravedad</option></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="direccion" placeholder="Ubicación" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                            <input type="text" id="estado" value="Veracruz" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none">
                        </div>
                        <textarea id="comentarios" placeholder="Notas extra..." rows="1" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm focus:ring-2 outline-none"></textarea>
                        <button type="submit" id="btnSubmitPropiedad" class="w-full py-2.5 rounded-full text-sm font-bold text-white bg-[#4ade80] hover:bg-green-500 text-green-900 transition-colors shadow-sm">Guardar Parcela</button>
                        <button type="button" id="btnCancelarPropiedad" class="hidden w-full py-2 rounded-full text-xs font-bold text-gray-600 bg-gray-200">Cancelar Edición</button>
                    </form>
                </div>

                <div id="vista-form-servicios" class="bg-white p-6 rounded-2xl shadow-sm border hidden">
                    <h3 id="tituloFormServio" class="text-lg font-bold text-gray-800 mb-4"><i class="fa-solid fa-plane-up text-green-600 mr-2"></i> Programar Vuelo</h3>
                    <form id="servicioForm" class="space-y-4">
                        <input type="hidden" id="editServioId">
                        <select id="selectPropiedad" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none"></select>
                        <input type="date" id="fecha_aplicacion" required class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm text-gray-600 outline-none">
                        
                        <!-- ESTA CAJA SE OCULTARÁ PARA TRABAJADORES -->
                        <div id="caja-costo" class="grid grid-cols-2 gap-3 hidden">
                            <input type="number" step="0.01" id="costo_servicio" placeholder="Costo ($ MXN)" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none">
                            <select id="estado_cuenta" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none">
                                <option value="Pendiente">Pendiente</option><option value="Parcial">Abono Parcial</option><option value="Cobrado">Cobrado</option>
                            </select>
                        </div>
                        
                        <input type="number" min="1" max="5" value="5" id="satisfaccion" placeholder="Satisfacción 1-5" class="w-full px-4 py-2 bg-gray-50 border rounded-lg text-sm outline-none">
                        
                        <button type="submit" id="btnSubmitServicio" class="w-full py-2.5 rounded-full text-sm font-bold text-white bg-[#4ade80] hover:bg-green-500 text-green-900 transition-colors shadow-sm">Registrar Vuelo</button>
                        <button type="button" id="btnCancelarServicio" class="hidden w-full py-2 rounded-full text-xs font-bold text-gray-600 bg-gray-200">Cancelar Edición</button>
                    </form>
                </div>
            </div>

            <!-- TABLAS -->
            <div class="block lg:table-cell w-full lg:w-2/3 vertical-align-top space-y-8">
                <!-- CLIENTES -->
                <div id="vista-tabla-clientes" class="bg-white rounded-2xl shadow-lg border overflow-hidden block">
                    <div class="tabla-header px-6 py-4 flex flex-col md:flex-row md:justify-between items-center text-white gap-3">
                        <h2 class="text-sm font-bold uppercase"><i class="fa-solid fa-list mr-2"></i> Directorio</h2>
                        <div class="relative w-full md:w-72">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fa-solid fa-search text-gray-400"></i></div>
                            <input type="text" id="buscadorClientes" onkeyup="filtrarClientes()" placeholder="Buscar por nombre o ID..." class="w-full pl-10 pr-4 py-1.5 bg-white text-gray-800 rounded-full text-sm outline-none">
                        </div>
                        <span id="contadorClientes" class="bg-white text-green-800 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap">0 REGISTRADOS</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y text-sm">
                            <thead class="bg-[#187547] text-white"><tr><th class="px-6 py-3 text-left">CLIENTE</th><th class="px-6 py-3 text-left">CONTACTO</th><th class="px-6 py-3 text-center">ACCIONES</th></tr></thead>
                            <tbody id="cuerpoTabla" class="bg-white divide-y"></tbody>
                        </table>
                    </div>
                </div>

                <!-- PROPIEDADES -->
                <div id="vista-tabla-propiedades" class="bg-white rounded-2xl shadow-lg border hidden">
                    <div class="tabla-header px-6 py-4 text-white"><h2 class="text-sm font-bold uppercase"><i class="fa-solid fa-map mr-2"></i> Parcelas</h2></div>
                    <div class="overflow-x-auto h-64">
                        <table class="min-w-full divide-y text-sm">
                            <thead class="bg-[#187547] text-white sticky top-0 z-10"><tr><th class="px-6 py-3 text-left">PROPIEDAD</th><th class="px-6 py-3 text-center">CULTIVO</th><th class="px-6 py-3 text-center">SUPERFICIE</th><th class="px-6 py-3 text-center">ACCIONES</th></tr></thead>
                            <tbody id="cuerpoTablaPropiedades" class="bg-white divide-y"></tbody>
                        </table>
                    </div>
                </div>

                <!-- SERVICIOS -->
                <div id="vista-tabla-servicios" class="bg-white rounded-2xl shadow-lg border hidden">
                    <div class="tabla-header px-6 py-4 text-white"><h2 class="text-sm font-bold uppercase"><i class="fa-solid fa-clipboard-check mr-2"></i> Vuelos T-50</h2></div>
                    <div class="overflow-x-auto h-64">
                        <table class="min-w-full divide-y text-sm">
                            <thead class="bg-[#187547] text-white sticky top-0 z-10">
                                <tr>
                                    <th class="px-6 py-3 text-left">RANCHO</th>
                                    <!-- AÑADIMOS UN ID A ESTE TÍTULO PARA OCULTARLO SI ES NECESARIO -->
                                    <th id="col-facturacion" class="px-6 py-3 text-left hidden">FACTURACIÓN</th>
                                    <th class="px-6 py-3 text-center">ACCIONES</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTablaServicios" class="bg-white divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div> 

    <!-- MODAL DETALLE -->
    <div id="modalDetalle" class="hidden fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col">
            <div class="bg-green-700 p-6 text-white text-center relative">
                <button onclick="cerrarModal()" class="absolute top-4 right-4"><i class="fa-solid fa-xmark text-xl"></i></button>
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fa-solid fa-user text-2xl"></i></div>
                <h2 id="modalNombre" class="text-xl font-extrabold"></h2><p id="modalId" class="text-green-200 text-sm mt-1"></p>
            </div>
            <div class="p-6 space-y-5 overflow-y-auto">
                <div class="bg-gray-50 rounded-2xl p-4 border space-y-3">
                    <p class="text-sm text-gray-700"><i class="fa-solid fa-envelope w-6 text-blue-500"></i> <span id="modalEmail"></span></p>
                    <p class="text-sm text-gray-700"><i class="fa-solid fa-phone w-6 text-green-500"></i> <span id="modalTelefono"></span></p>
                    <p class="text-sm text-gray-700"><i class="fa-solid fa-id-card w-6 text-purple-500"></i> <span id="modalRfc"></span></p>
                </div>
                <div><h4 class="font-bold text-gray-800 mb-3 text-sm">Parcelas:</h4><div id="modalParcelas" class="space-y-2"></div></div>
            </div>
            <div class="p-4 border-t"><button onclick="cerrarModal()" class="w-full py-2.5 bg-gray-200 rounded-xl text-sm font-bold">Cerrar</button></div>
        </div>
    </div>


    <script>
        const API_URL = "https://agrosoluciones-backend.onrender.com";
        let memoriaClientes = [], memoriaPropiedades = [], memoriaServicios = [];
        let rolUsuario = 'trabajador'; 

        // --- SISTEMA DE LOGIN Y MAGIA DE ROLES ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('loginError');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Verificando...';
            btn.disabled = true; errorMsg.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: document.getElementById('loginEmail').value, 
                        password: document.getElementById('loginPassword').value 
                    })
                });

                const data = await res.json(); 

                if (res.ok) {
                    rolUsuario = data.rol || 'trabajador';

                    // AJUSTAMOS LA INTERFAZ SEGÚN EL ROL
                    if(rolUsuario === 'admin') {
                        document.getElementById('badge-rol').innerHTML = '<i class="fa-solid fa-crown mr-1"></i> MODO ADMIN VIP';
                        // MOSTRAMOS LAS CAJAS DE PRECIOS Y LA COLUMNA DE LA TABLA
                        document.getElementById('caja-costo').classList.remove('hidden'); 
                        document.getElementById('col-facturacion').classList.remove('hidden'); 
                    } else {
                        document.getElementById('badge-rol').innerHTML = '<i class="fa-solid fa-user-gear mr-1"></i> MODO PERSONAL';
                        // ASEGURAMOS QUE SIGAN OCULTAS PARA EL TRABAJADOR
                        document.getElementById('caja-costo').classList.add('hidden'); 
                        document.getElementById('col-facturacion').classList.add('hidden'); 
                    }

                    document.getElementById('login-container').classList.add('hidden');
                    document.getElementById('dashboard-container').classList.remove('hidden');
                    await inicializarPanel(); 
                } else {
                    errorMsg.textContent = "Correo o contraseña incorrectos.";
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'Iniciar Sesión'; btn.disabled = false;
                }
            } catch (error) {
                errorMsg.textContent = "Error al conectar con el servidor.";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'Iniciar Sesión'; btn.disabled = false;
            }
        });

        function cerrarSesion() { window.location.reload(); }
        async function inicializarPanel() { await cargarClientes(); await cargarPropiedades(); await cargarServicios(); }
        function cambiarVista(vista) {
            ['clientes', 'propiedades', 'servicios'].forEach(sec => {
                document.getElementById('vista-form-' + sec).classList.add('hidden');
                document.getElementById('vista-tabla-' + sec).classList.add('hidden');
                document.getElementById('nav-' + sec).className = "border border-green-500/50 hover:bg-green-700 px-4 py-2 rounded-md text-sm font-medium transition-colors";
            });
            document.getElementById('vista-form-' + vista).classList.remove('hidden');
            document.getElementById('vista-tabla-' + vista).classList.remove('hidden');
            document.getElementById('nav-' + vista).className = "bg-green-700 hover:bg-green-600 px-4 py-2 rounded-md text-sm font-bold shadow-sm";
        }

        // --- FUNCIONES MODAL ---
        function verDetalleCliente(id) {
            const c = memoriaClientes.find(item => item.id === id);
            document.getElementById('modalNombre').textContent = `${c.nombre} ${c.apellidos}`;
            document.getElementById('modalId').textContent = `ID: #${String(c.num_cliente).padStart(3, '0')}`;
            document.getElementById('modalEmail').textContent = c.email || 'N/A';
            document.getElementById('modalTelefono').textContent = c.telefono || 'N/A';
            document.getElementById('modalRfc').textContent = c.rfc || 'N/A';
            
            const parcelas = memoriaPropiedades.filter(p => p.cliente_id === id);
            const contenedor = document.getElementById('modalParcelas');
            contenedor.innerHTML = parcelas.length === 0 ? '<p class="text-xs text-gray-400 italic text-center py-2">Sin parcelas</p>' : '';
            parcelas.forEach(p => {
                contenedor.innerHTML += `<div class="p-2 border rounded-lg text-sm bg-gray-50"><b>${p.nombre_propiedad}</b> - ${p.superficie_has} Ha</div>`;
            });
            document.getElementById('modalDetalle').classList.remove('hidden');
        }
        function cerrarModal() { document.getElementById('modalDetalle').classList.add('hidden'); }

        // --- DIBUJAR TABLAS ---
        function renderizarTablaClientes(lista) {
            const cuerpo = document.getElementById('cuerpoTabla'); cuerpo.innerHTML = '';
            document.getElementById('contadorClientes').textContent = `${lista.length} REGISTRADOS`;
            lista.forEach(c => {
                const idC = c.num_cliente ? String(c.num_cliente).padStart(3, '0') : 'N/A';
                const btnBorrar = rolUsuario === 'admin' ? `<button onclick="eliminarCliente('${c.id}')" class="bg-rose-600 text-white text-[10px] px-2 py-1 rounded">Borrar</button>` : '';
                cuerpo.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <p class="font-bold text-gray-800 cursor-pointer hover:text-green-600" onclick="verDetalleCliente('${c.id}')">${c.nombre} ${c.apellidos}</p>
                            <p class="text-[10px] text-gray-400">#${idC} | RFC: ${c.rfc||'S/N'}</p>
                        </td>
                        <td class="px-6 py-4 text-sm">${c.telefono}</td>
                        <td class="px-6 py-4 text-center space-x-1">
                            <button onclick="prepararEdicionCliente('${c.id}')" class="bg-amber-400 text-white text-[10px] px-2 py-1 rounded">Editar</button>
                            ${btnBorrar}
                        </td>
                    </tr>
                `;
            });
        }
        function filtrarClientes() {
            const t = document.getElementById('buscadorClientes').value.toLowerCase();
            renderizarTablaClientes(memoriaClientes.filter(c => `${c.nombre} ${c.apellidos}`.toLowerCase().includes(t) || String(c.num_cliente).includes(t)));
        }

        async function cargarClientes() {
            const res = await fetch(`${API_URL}/clientes/`); memoriaClientes = await res.json();
            const select = document.getElementById('selectCliente'); select.innerHTML = '<option value="">-- Propietario --</option>';
            memoriaClientes.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nombre} ${c.apellidos}</option>`);
            renderizarTablaClientes(memoriaClientes);
        }

        async function cargarPropiedades() {
            const res = await fetch(`${API_URL}/propiedades/`); memoriaPropiedades = await res.json();
            const c = document.getElementById('cuerpoTablaPropiedades'); c.innerHTML = '';
            const select = document.getElementById('selectPropiedad'); select.innerHTML = '<option value="">-- Parcela --</option>';
            memoriaPropiedades.forEach(p => {
                const btnBorrar = rolUsuario === 'admin' ? `<button onclick="eliminarPropiedad('${p.id}')" class="bg-rose-600 text-white text-[10px] px-2 py-1 rounded"><i class="fa-solid fa-trash"></i></button>` : '';
                c.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-bold text-sm">${p.nombre_propiedad}</td>
                        <td class="px-6 py-4 text-center text-sm">${p.tipo_cultivo}</td>
                        <td class="px-6 py-4 text-center font-bold">${p.superficie_has} Ha</td>
                        <td class="px-6 py-4 text-center space-x-1">
                            <button onclick="prepararEdicionPropiedad('${p.id}')" class="bg-amber-400 text-white text-[10px] px-2 py-1 rounded"><i class="fa-solid fa-pen"></i></button>
                            ${btnBorrar}
                        </td>
                    </tr>`;
                select.innerHTML += `<option value="${p.id}">${p.nombre_propiedad}</option>`;
            });
        }

        async function cargarServicios() {
            const res = await fetch(`${API_URL}/servicios/`); memoriaServicios = await res.json();
            const c = document.getElementById('cuerpoTablaServicios'); c.innerHTML = '';
            memoriaServicios.forEach(s => {
                const pr = memoriaPropiedades.find(p => p.id === s.propiedad_id);
                
                // CONDICION: Si es admin, creamos el pedazo de código con la columna de dinero. Si no, lo dejamos vacío.
                let columnaDinero = '';
                if (rolUsuario === 'admin') {
                    columnaDinero = `
                        <td class="px-6 py-4">
                            <span class="text-green-700 font-bold mr-2">$${s.costo_servicio}</span>
                            <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded">${s.estado_cuenta}</span>
                        </td>`;
                }

                const btnBorrar = rolUsuario === 'admin' ? `<button onclick="eliminarServio('${s.id}')" class="bg-rose-600 text-white text-[10px] px-2 py-1 rounded">Borrar</button>` : '';

                c.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-bold text-sm">${pr ? pr.nombre_propiedad : 'S/N'}<br><span class="text-[10px] font-normal text-gray-400">${s.fecha_aplicacion}</span></td>
                        ${columnaDinero}
                        <td class="px-6 py-4 text-center space-x-1">
                            <button onclick="prepararEdicionServio('${s.id}')" class="bg-amber-400 text-white text-[10px] px-2 py-1 rounded">Editar</button>
                            ${btnBorrar}
                        </td>
                    </tr>`;
            });
        }

        // --- BORRADOS ---
        async function eliminarCliente(id) { if(confirm("¿Eliminar?")) { await fetch(`${API_URL}/clientes/${id}`, {method: 'DELETE'}); await inicializarPanel();} }
        async function eliminarPropiedad(id) { if(confirm("¿Eliminar?")) { await fetch(`${API_URL}/propiedades/${id}`, {method: 'DELETE'}); await inicializarPanel();} }
        async function eliminarServio(id) { if(confirm("¿Eliminar?")) { await fetch(`${API_URL}/servicios/${id}`, {method: 'DELETE'}); await inicializarPanel();} }

        // --- EDICIÓN MODO RÁPIDO ---
        function prepararEdicionCliente(id) {
            const c = memoriaClientes.find(i => i.id === id); document.getElementById('editClienteId').value = c.id;
            document.getElementById('nombre').value = c.nombre; document.getElementById('apellidos').value = c.apellidos;
            document.getElementById('email').value = c.email; document.getElementById('telefono').value = c.telefono; document.getElementById('rfc').value = c.rfc;
            document.getElementById('btnSubmitCliente').innerText = "Actualizar"; document.getElementById('btnCancelarCliente').classList.remove('hidden');
        }
        function limpiarFormCliente() { document.getElementById('registroForm').reset(); document.getElementById('editClienteId').value = ''; document.getElementById('btnSubmitCliente').innerText = "Guardar Cliente"; document.getElementById('btnCancelarCliente').classList.add('hidden'); }
        document.getElementById('btnCancelarCliente').addEventListener('click', limpiarFormCliente);

        function prepararEdicionPropiedad(id) {
            const p = memoriaPropiedades.find(i => i.id === id); document.getElementById('editPropiedadId').value = p.id;
            document.getElementById('selectCliente').value = p.cliente_id; document.getElementById('nombre_propiedad').value = p.nombre_propiedad;
            document.getElementById('tipo_cultivo').value = p.tipo_cultivo; document.getElementById('superficie_has').value = p.superficie_has;
            document.getElementById('sistema_riego').value = p.sistema_riego; document.getElementById('direccion').value = p.direccion;
            document.getElementById('estado').value = p.estado; document.getElementById('comentarios').value = p.comentarios;
            document.getElementById('btnSubmitPropiedad').innerText = "Actualizar"; document.getElementById('btnCancelarPropiedad').classList.remove('hidden');
        }
        function limpiarFormPropiedad() { document.getElementById('propiedadForm').reset(); document.getElementById('editPropiedadId').value = ''; document.getElementById('estado').value = 'Veracruz'; document.getElementById('btnSubmitPropiedad').innerText = "Guardar Parcela"; document.getElementById('btnCancelarPropiedad').classList.add('hidden'); }
        document.getElementById('btnCancelarPropiedad').addEventListener('click', limpiarFormPropiedad);

        function prepararEdicionServio(id) {
            const s = memoriaServicios.find(i => i.id === id); document.getElementById('editServioId').value = s.id;
            document.getElementById('selectPropiedad').value = s.propiedad_id; document.getElementById('fecha_aplicacion').value = s.fecha_aplicacion;
            
            document.getElementById('costo_servicio').value = rolUsuario === 'admin' ? s.costo_servicio : 0; 
            document.getElementById('estado_cuenta').value = rolUsuario === 'admin' ? s.estado_cuenta : 'Pendiente';
            
            document.getElementById('satisfaccion').value = s.satisfaccion;
            document.getElementById('btnSubmitServicio').innerText = "Actualizar"; document.getElementById('btnCancelarServicio').classList.remove('hidden');
        }
        function limpiarFormServicio() { document.getElementById('servicioForm').reset(); document.getElementById('editServioId').value = ''; document.getElementById('satisfaccion').value = '5'; document.getElementById('btnSubmitServicio').innerText = "Registrar Vuelo"; document.getElementById('btnCancelarServicio').classList.add('hidden'); }
        document.getElementById('btnCancelarServicio').addEventListener('click', limpiarFormServicio);

        // --- SUBMITS ---
        document.getElementById('registroForm').addEventListener('submit', async function(e) { e.preventDefault(); const id = document.getElementById('editClienteId').value; const d = {nombre: document.getElementById('nombre').value, apellidos: document.getElementById('apellidos').value, email: document.getElementById('email').value, telefono: document.getElementById('telefono').value, rfc: document.getElementById('rfc').value}; await fetch(id ? `${API_URL}/clientes/${id}` : `${API_URL}/clientes/`, { method: id ? 'PUT':'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) }); limpiarFormCliente(); await inicializarPanel(); });
        document.getElementById('propiedadForm').addEventListener('submit', async function(e) { e.preventDefault(); const id = document.getElementById('editPropiedadId').value; const d = {cliente_id: document.getElementById('selectCliente').value, nombre_propiedad: document.getElementById('nombre_propiedad').value, direccion: document.getElementById('direccion').value, estado: document.getElementById('estado').value, tipo_cultivo: document.getElementById('tipo_cultivo').value, superficie_has: parseFloat(document.getElementById('superficie_has').value), sistema_riego: document.getElementById('sistema_riego').value, comentarios: document.getElementById('comentarios').value}; await fetch(id ? `${API_URL}/propiedades/${id}` : `${API_URL}/propiedades/`, { method: id ? 'PUT':'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) }); limpiarFormPropiedad(); await inicializarPanel(); });
        document.getElementById('servicioForm').addEventListener('submit', async function(e) { 
            e.preventDefault(); 
            const id = document.getElementById('editServioId').value; 
            let costoFinal = rolUsuario === 'admin' ? parseFloat(document.getElementById('costo_servicio').value) : 0;
            let estadoC = rolUsuario === 'admin' ? document.getElementById('estado_cuenta').value : 'Pendiente';
            const d = {propiedad_id: document.getElementById('selectPropiedad').value, fecha_aplicacion: document.getElementById('fecha_aplicacion').value, costo_servicio: costoFinal, estado_cuenta: estadoC, satisfaccion: parseInt(document.getElementById('satisfaccion').value)}; 
            await fetch(id ? `${API_URL}/servicios/${id}` : `${API_URL}/servicios/`, { method: id ? 'PUT':'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(d) }); limpiarFormServicio(); await inicializarPanel(); 
        });
    </script>
</body>
</html>
